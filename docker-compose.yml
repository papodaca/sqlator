services:
  postgres:
    image: postgres:17
    ports:
      - 5454:5432
    environment:
      POSTGRES_USER: sqlator
      POSTGRES_PASSWORD: sqlator
      POSTGRES_DB: sqlator
    volumes:
      - pgdata:/var/lib/postgresql/data

  mysql:
    image: mysql:8.4
    ports:
      - 3336:3306
    environment:
      MYSQL_ROOT_PASSWORD: sqlator
      MYSQL_USER: sqlator
      MYSQL_PASSWORD: sqlator
      MYSQL_DATABASE: sqlator
    volumes:
      - mysqldata:/var/lib/mysql

  mariadb:
    image: mariadb:11
    ports:
      - 3337:3306
    environment:
      MARIADB_ROOT_PASSWORD: sqlator
      MARIADB_USER: sqlator
      MARIADB_PASSWORD: sqlator
      MARIADB_DATABASE: sqlator
    volumes:
      - mariadbdata:/var/lib/mysql

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - 1444:1433
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: Sqlator123!
      MSSQL_DB: sqlator
    volumes:
      - mssqldata:/var/opt/mssql

  oracle:
    image: gvenzl/oracle-free:latest-faststart
    ports:
      - 1522:1521
    environment:
      ORACLE_PASSWORD: Sqlator123!
    volumes:
      - oracledata:/opt/oracle/oradata

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - 8123:8123
      - 9000:9000
    environment:
      CLICKHOUSE_USER: sqlator
      CLICKHOUSE_PASSWORD: sqlator
      CLICKHOUSE_DB: sqlator
    volumes:
      - clickhousedata:/var/lib/clickhouse

volumes:
  pgdata:
  mysqldata:
  mariadbdata:
  mssqldata:
  oracledata:
  clickhousedata:


  # - PostgreSQL: postgresql://sqlator:sqlator@localhost:5454/sqlator
  # - MySQL: mysql://sqlator:sqlator@localhost:3336/sqlator
  # - MariaDB: mysql://sqlator:sqlator@localhost:3337/sqlator
  # - MSSQL: mssql://sa:Sqlator123!@localhost:1444/master
  # - Oracle (experimental): oracle://system:Sqlator123!@localhost:1522/FREEPDB1
  # - ClickHouse: clickhouse://sqlator:sqlator@localhost:8123/sqlator

